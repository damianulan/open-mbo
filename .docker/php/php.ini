[PHP]
; This php.ini is tailored for Laravel apps running in containers.
; It favors sensible defaults for dev/CI while remaining production-safe.

; ---- General ----
short_open_tag = Off
expose_php = Off
default_charset = "UTF-8"
date.timezone = "Europe/Warsaw"

; ---- Resource limits ----
memory_limit = 2048M
max_execution_time = 60
max_input_time = 60
max_input_vars = 5000

; ---- Uploads ----
file_uploads = On
upload_max_filesize = 64M
post_max_size = 64M
max_file_uploads = 10

; ---- Errors / logging ----
error_reporting = E_ALL
display_errors = Off
display_startup_errors = Off
log_errors = On
; Log to container stderr
error_log = /proc/self/fd/2

; ---- Paths ----
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; ---- Security / hardening ----
; Not strictly required for PHP-FPM, but harmless and commonly recommended.
cgi.fix_pathinfo = 0

[Session]
session.use_strict_mode = 1
session.use_only_cookies = 1
session.use_cookies = 1
session.cookie_httponly = 1
session.cookie_samesite = Lax

[opcache]
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 512
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.save_comments = 0
; In dev, keep timestamp checks on so code changes are picked up.
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
