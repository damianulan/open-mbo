name: Pull Request Type Coverage

on:
  pull_request:
    branches:
      - staging

permissions:
  contents: read

jobs:
  type-coverage:
    name: Pest Type Coverage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php-version: ['8.4']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: composer:v2
          extensions: bcmath, ctype, curl, dom, exif, fileinfo, gd, intl, mbstring, pdo_sqlite, sqlite3, zip

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-php-${{ matrix.php-version }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php-version }}-composer-

      - name: Prepare application environment
        run: |
          cp .env.example .env
          mkdir -p tests/Unit

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate application key
        run: php artisan key:generate --ansi

      - name: Run Pest type coverage
        env:
          APP_ENV: testing
        run: ./vendor/bin/pest --type-coverage --min=96
